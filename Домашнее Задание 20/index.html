<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>

<body>

    <div class="wrapper">
        <form class="form">

            <div class="field">
                <label for="name">Имя</label>
                <input type="text" id="name" placeholder="Введите имя" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>

            <div class="field">
                <label for="theme">Тема обращения</label>
                <select id="theme">
                    <option>Вопрос</option>
                    <option>Поддержка</option>
                    <option>Предложение</option>
                </select>
            </div>

            <div class="field">
                <label for="message">Сообщение</label>
                <textarea id="message" placeholder="Введите сообщение"></textarea>
            </div>

            <input type="checkbox" id="check">

            <label for="check" class="checkbox">
                <span></span>
                Согласен на обработку данных
            </label>

            <button type="submit" class="btn active">Отправить</button>
            <button type="button" class="btn non-active" disabled>Отправить</button>

        </form>
    </div>
</body>

</html>
