<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашнее задание 57</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <button id="btn">Open</button>
    <div id="modal">
        <div class="modal-content">
            <div class="modal__content-header">
                <p>Вы получите подробную консультацию</p>
                <span class="close">x</span>
            </div>

            <div class="modal__content-body">
                <form action="#" class="modal__content-form">
                    <input type="text" placeholder="Ваше имя *" id="name" required>
                    <input type="email" placeholder="Ваш email *" id="email" required>
                    <input type="text" placeholder="Задайте свой вопрос" id="question" required>
                    <button type="submit">Отправить</button>
                </form>
            </div>


        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
